name: Build & Deploy Protocolo Hidra

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'  # A cada 3 horas

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        run: |
          npm install
          npm run build

      - name: Commit updated files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/glossario.json docs/sitemap.xml docs/llms.txt docs/robots.txt docs/script.js
          git diff --cached --quiet || git commit -m "chore: build automático $(date +%Y-%m-%d-%H%M)"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
