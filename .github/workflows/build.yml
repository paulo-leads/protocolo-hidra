name: Build Protocolo Hidra

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # necessário para o commit do build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install beautifulsoup4 lxml requests

      - name: Executar script de build
        run: python build_protocolo_hidra.py

      - name: Commit e push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Build automático: atualização de datas e spintax"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

      - name: Enviar URLs para IndexNow (Bing)
        run: python indexnow_submit.py   # script que usa a chave fixa
