# ============================================================
# Protocolo Hidra — Build Automático
# Agenda: Diário às 06:00 UTC (03:00 BRT)
# Acionamento: Manual (workflow_dispatch) para testes
# ============================================================

name: Protocolo Hidra — Build Diário

on:
  schedule:
    # 06:00 UTC = 03:00 BRT — todo dia
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permite rodar manualmente pelo botão no GitHub

permissions:
  contents: write

jobs:
  build:
    name: Gerar glossário, sitemap, llms.txt e injetar freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # PASSO 1: Checkout do repositório
      - name: ⬇️ Checkout do repositório
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      # PASSO 2: Setup do Python
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # PASSO 3: Instalar dependências
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml

      # PASSO 4: Rodar o script de build
      - name: 🏗️ Executar build
        run: python build.py

      # PASSO 5: Commit e push automático
      - name: 📤 Commit e push das alterações
        run: |
          git config --global user.name "Protocolo Hidra Bot"
          git config --global user.email "bot@protocolo-hidra.local"
          git add -A
          # Só faz commit se houver mudanças
          if git diff --cached --quiet; then
            echo "ℹ️ Nenhuma alteração detectada — pulando commit"
          else
            git commit -m "Build automático: $(date '+%Y-%m-%d %H:%M UTC') — freshness + spintax + blocos contextuais"
            git push
            echo "✅ Build comitado e enviado com sucesso"
          fi
