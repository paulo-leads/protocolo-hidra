name: Build Protocolo Hidra

on:
  push:
    branches: [ main ]   # ou master, dependendo do seu branch
  workflow_dispatch:     # permite executar manualmente pela interface

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install beautifulsoup4 lxml

      - name: Executar script de build
        run: python build_protocolo_hidra.py

      - name: Commit e push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Build automático: atualização de datas e spintax"
          git push
