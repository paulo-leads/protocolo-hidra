# ============================================================
# Protocolo Hidra — Build Diário v2
# Correção: sem requirements.txt, compatível com Node 24
# ============================================================

name: Protocolo Hidra — Build Diário

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Gerar glossário, sitemap, llms.txt e injetar freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout do repositório
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml

      - name: 📝 Verificar se build.py existe
        run: |
          if [ ! -f build.py ]; then
            echo "❌ build.py não encontrado na raiz do repositório!"
            echo "📌 Certifique-se de que o script está em:"
            echo "   https://github.com/paulo-leads/protocolo-hidra/blob/main/build.py"
            exit 1
          fi
          echo "✅ build.py encontrado"

      - name: 🏗️ Executar build
        run: python build.py

      - name: 📊 Resumo das alterações
        run: |
          echo "=== ARQUIVOS MODIFICADOS ==="
          git diff --stat -- ':!node_modules/'
          echo ""
          echo "=== TOTAL DE MUDANÇAS ==="
          git diff --shortstat -- ':!node_modules/'
