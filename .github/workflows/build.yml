name: Build Protocolo Hidra

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# ⬇️ ADICIONE ESTA LINHA para dar permissão de escrita
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          # Importante: usar o token para checkout também
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install beautifulsoup4 lxml

      - name: Executar script de build
        run: python build_protocolo_hidra.py

      - name: Commit e push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Build automático: atualização de datas e spintax"
          # Usa o token para autenticar
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
